name: Build and Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      release_kind:
        description: "Release kind to prepare"
        type: choice
        options: ["nightly", "stable"]
        default: "nightly"
      dry_run:
        description: "Build artifacts but skip GitHub release creation"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.12"

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.check.outputs.version }}
      is_nightly: ${{ steps.check.outputs.is_nightly }}
      tag: ${{ steps.check.outputs.tag }}
      target_ref: ${{ steps.check.outputs.target_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check release inputs
        id: check
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "is_nightly=false" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "target_ref=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.release_kind }}" == "stable" ]]; then
            echo "is_nightly=false" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "target_ref=main" >> "$GITHUB_OUTPUT"
          else
            echo "is_nightly=true" >> "$GITHUB_OUTPUT"
            echo "tag=nightly-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "target_ref=dev" >> "$GITHUB_OUTPUT"
          fi

  build-package:
    name: Python package
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            pip-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
            pip-${{ runner.os }}-

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package artifacts
        run: python -m build

      - name: Stage release assets
        env:
          IS_NIGHTLY: ${{ needs.prepare.outputs.is_nightly }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p assets
          TIMESTAMP=$(date -u +%Y%m%d)
          for f in dist/*; do
            [ -f "$f" ] || continue
            ext="${f##*.}"
            base="$(basename "$f")"
            if [ "$IS_NIGHTLY" = "true" ]; then
              cp "$f" "assets/station-scout-nightly-${TIMESTAMP}-${base}"
            else
              cp "$f" "assets/station-scout-${VERSION}-${base}"
            fi
          done
          cd assets
          sha256sum * > checksums.txt

      - uses: actions/upload-artifact@v7
        with:
          name: package-assets
          path: assets/*

  release:
    name: GitHub release
    needs: [prepare, build-package]
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: package-assets
          path: assets

      - name: Write release notes
        env:
          IS_NIGHTLY: ${{ needs.prepare.outputs.is_nightly }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ -f CHANGELOG.md ]; then
            awk '/^## /{seen++} seen <= 2 {print}' CHANGELOG.md > notes.md
          elif [ "$IS_NIGHTLY" = "true" ]; then
            echo "Station Scout nightly build." > notes.md
          else
            echo "Station Scout v${VERSION}." > notes.md
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_NIGHTLY: ${{ needs.prepare.outputs.is_nightly }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ "$IS_NIGHTLY" = "true" ]; then
            gh release delete "$TAG" -y --cleanup-tag 2>/dev/null || true
            gh release create "$TAG" assets/* --notes-file notes.md \
              --title "Nightly $(date -u +%Y-%m-%d)" --prerelease --target dev
          elif gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" assets/* --clobber
            gh release edit "$TAG" --notes-file notes.md --title "Station Scout v${VERSION}"
          else
            gh release create "$TAG" assets/* --notes-file notes.md \
              --title "Station Scout v${VERSION}"
          fi
