name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: "1"

jobs:
  validate:
    name: Validate (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            primary: true
          - os: windows-latest
            python-version: "3.12"
            primary: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            pip-${{ runner.os }}-py${{ matrix.python-version }}-
            pip-${{ runner.os }}-

      - name: Install Linux wxPython runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libnotify-dev \
            libsdl2-dev \
            libwebkit2gtk-4.1-dev \
            freeglut3-dev \
            xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ runner.os }}" = "Linux" ]; then
            python -m pip install \
              -f https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-24.04 \
              --only-binary wxPython \
              wxPython
          else
            python -m pip install --only-binary wxPython wxPython
          fi
          python -m pip install -e . build pytest ruff

      - name: Ruff
        if: matrix.primary
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Build package
        if: matrix.primary
        run: python -m build
