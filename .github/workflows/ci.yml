name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uv run --extra dev python -m ruff check .
      - name: Test
        run: uv run --extra dev python -m pytest
      - name: Build
        run: uv run --extra dev python -m build
